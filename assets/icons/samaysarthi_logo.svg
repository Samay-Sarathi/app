<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
  <!-- Circular background with subtle gradient feel -->
  <circle cx="48" cy="48" r="44" fill="#00C853" opacity="0.12"/>
  <circle cx="48" cy="48" r="44" stroke="#00C853" stroke-width="2.5" fill="none"/>

  <!-- Clock outline representing "Samay" (Time) -->
  <circle cx="48" cy="44" r="24" stroke="#00C853" stroke-width="2.5" fill="none"/>

  <!-- Clock hands forming a heartbeat-like angle -->
  <line x1="48" y1="44" x2="48" y2="28" stroke="#00C853" stroke-width="3" stroke-linecap="round"/>
  <line x1="48" y1="44" x2="60" y2="38" stroke="#00C853" stroke-width="3" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="48" cy="44" r="2.5" fill="#00C853"/>

  <!-- Heartbeat pulse across the clock -->
  <polyline points="26,50 36,50 40,40 44,56 48,44 52,52 56,46 66,46" stroke="#FF5252" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Small ambulance cross at bottom -->
  <rect x="44" y="72" width="8" height="14" rx="1.5" fill="#00C853"/>
  <rect x="40" y="76" width="16" height="6" rx="1.5" fill="#00C853"/>
</svg>
